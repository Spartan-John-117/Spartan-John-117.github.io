<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSC SECURE ACCESS — K.MONMOUTON</title>
    <meta name="description" content="Portail d'accès sécurisé — Kevin Monmouton Portfolio.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ============================================
           PAGE D'ACCUEIL SECURE ACCESS — OVERRIDES
           ============================================ */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            cursor: url('../assets/crosshair-blue.svg') 16 16, crosshair;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.08) 2px,
                    rgba(0, 0, 0, 0.08) 4px);
            pointer-events: none;
            z-index: 100;
            animation: scanlines 0.5s steps(1) infinite;
        }

        @keyframes scanlines {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 4px;
            }
        }

        /* ---- UNSC Banner ---- */
        .unsc-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 30px;
            background: rgba(0, 8, 20, 0.9);
            border-bottom: 1px solid rgba(0, 229, 255, 0.25);
            z-index: 50;
        }

        .unsc-logo {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--color-cortana-cyan);
            opacity: 0.7;
        }

        .unsc-status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
        }

        .unsc-status .blink {
            animation: blink 1s step-start infinite;
            color: var(--color-cortana-cyan);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ---- Login Container ---- */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        /* Corner decorations */
        .login-card {
            position: relative;
            background: rgba(0, 8, 20, 0.85);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 50px 45px 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.08), inset 0 0 40px rgba(0, 0, 0, 0.4);
        }

        .login-card::before,
        .login-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--color-visor-gold);
            border-style: solid;
        }

        /* Bottom Left */
        .login-card::before {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 2px 2px;
        }

        /* Top Right */
        .login-card::after {
            top: -1px;
            right: -1px;
            border-width: 2px 2px 0 0;
        }

        /* ---- Header ---- */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header .system-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: rgba(0, 229, 255, 0.5);
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .login-header h1 {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 6px;
        }

        .login-header .classification {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--color-visor-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            padding: 3px 10px;
            border: 1px solid rgba(232, 166, 23, 0.3);
            display: inline-block;
        }

        /* Divider */
        .hud-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0;
        }

        .hud-divider::before,
        .hud-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 229, 255, 0.4));
        }

        .hud-divider::after {
            background: linear-gradient(to left, transparent, rgba(0, 229, 255, 0.4));
        }

        .hud-divider-dot {
            width: 6px;
            height: 6px;
            background: var(--color-cortana-cyan);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            flex-shrink: 0;
        }

        /* ---- Form ---- */
        .login-form .form-group {
            margin-bottom: 22px;
        }

        .login-form label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: rgba(0, 229, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: rgba(0, 229, 255, 0.4);
            font-size: 0.75rem;
            letter-spacing: 0;
            font-family: 'Share Tech Mono', monospace;
            pointer-events: none;
        }

        .hud-input {
            width: 100%;
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            letter-spacing: 2px;
            padding: 12px 14px 12px 48px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            box-sizing: border-box;
        }

        .hud-input:focus {
            border-color: rgba(0, 229, 255, 0.6);
            background: rgba(0, 229, 255, 0.06);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .hud-input.input-locked {
            color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .hud-input.input-filled {
            border-color: rgba(0, 229, 255, 0.6);
            color: var(--color-cortana-cyan);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        /* ---- Bruteforce button ---- */
        .btn-bruteforce {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid rgba(255, 60, 60, 0.5);
            color: rgba(255, 100, 100, 0.8);
            font-family: var(--font-heading);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: url('../assets/crosshair-gold.svg') 16 16, pointer;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            position: relative;
            overflow: hidden;
        }

        .btn-bruteforce:hover:not(:disabled) {
            background: rgba(255, 60, 60, 0.08);
            border-color: rgba(255, 80, 80, 0.8);
            color: #ff6464;
            box-shadow: 0 0 20px rgba(255, 60, 60, 0.15);
        }

        .btn-bruteforce:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ---- Connect button ---- */
        .btn-connect {
            width: 100%;
            padding: 14px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: var(--color-cortana-cyan);
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: url('../assets/crosshair-gold.svg') 16 16, pointer;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 14px;
            box-sizing: border-box;
        }

        .btn-connect:not(.unlocked) {
            opacity: 0.3;
            pointer-events: none;
            cursor: not-allowed;
        }

        .btn-connect.unlocked {
            opacity: 1;
            pointer-events: all;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .btn-connect.unlocked:hover {
            background: rgba(0, 229, 255, 0.18);
            border-color: var(--color-cortana-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
            }

            50% {
                box-shadow: 0 0 25px rgba(0, 229, 255, 0.35);
            }
        }

        /* ---- Terminal / Bruteforce log ---- */
        .terminal-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0;
            background: rgba(0, 2, 5, 0.97);
            border-top: 1px solid rgba(255, 60, 60, 0.4);
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 200;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
        }

        .terminal-log.open {
            height: 230px;
        }

        .terminal-inner {
            padding: 12px 20px;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .terminal-line {
            color: #ff4444;
            opacity: 0;
            animation: fade-in-line 0.1s forwards;
            line-height: 1.5;
            white-space: nowrap;
        }

        .terminal-line.success {
            color: #a3e635;
        }

        .terminal-line.info {
            color: rgba(0, 229, 255, 0.7);
        }

        @keyframes fade-in-line {
            from {
                opacity: 0;
                transform: translateX(-6px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ---- Footer info ---- */
        .login-footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .login-footer .node-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .login-footer .warning-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: rgba(232, 166, 23, 0.45);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ---- Animated hex background vignette ---- */
        /* Animated hex background — hidden on login page */
        .hex-grid-bg {
            display: none;
        }

        /* ONI background image */
        body {
            background-image: url('../assets/ONI.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* Dark overlay to keep card readable */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 5, 15, 0.50);
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="hex-grid-bg"></div>

    <!-- Top banner -->
    <div class="unsc-banner">
        <div class="unsc-logo">UNSC // ONI Section 3</div>
        <div class="unsc-status">
            ONI secure cryptosystems &nbsp;|&nbsp; <span class="blink">■</span> LIVE &nbsp;|&nbsp; SECURE/PRIORITY/ALPHA
        </div>
    </div>

    <!-- Login card -->
    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-header">
                <div class="system-label">// Authentication System //</div>
                <h1>Personal Files Access</h1>
                <span class="classification">⬥ CLASSIFICATION : CONFIDENTIAL ⬥</span>
            </div>

            <div class="hud-divider">
                <div class="hud-divider-dot"></div>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleConnect(event)">
                <div class="form-group">
                    <label for="username">▸ Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">USER:</span>
                        <input type="text" id="username" class="hud-input input-filled" value="Administrator" readonly
                            style="text-align: center; padding-left: 14px;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">▸ Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">PASSWORD:</span>
                        <input type="password" id="password" class="hud-input input-locked" value=""
                            placeholder="_ _ _ _ _ _" readonly style="text-align: center; padding-left: 14px;">
                    </div>
                </div>

                <button type="button" class="btn-bruteforce" id="bruteBtn" onclick="startBruteforce()">
                    ⚡ &nbsp;Bypass Password
                </button>

                <a href="portfolio.html" class="btn-connect" id="connectBtn" onclick="grantAccess(event)">
                    ▶ &nbsp;Connect
                </a>
            </form>

            <div class="login-footer">
                <div class="node-info">NODE: α-7.3 &nbsp;//&nbsp; SYSTEM: Epsilon Eridani</div>
                <div class="warning-label">⚠ ACCESS GRANTED</div>
            </div>
        </div>
    </div>

    <!-- Terminal log -->
    <div class="terminal-log" id="terminalLog">
        <div class="terminal-inner" id="terminalInner"></div>
    </div>

    <script>
        const BRUTEFORCE_LINES = [
            { text: "[INIT] Loading intrusion modules...", type: "info", delay: 0 },
            { text: "[SCAN] Authentication protocol detected: HALO-AUTH v4.2", type: "red", delay: 300 },
            { text: "[SCAN] Target identified → NODE_α-7 // PORT 443", type: "red", delay: 600 },
            { text: "[ATCK] Launching dictionary attack...", type: "red", delay: 1000 },
            { text: "[DICT] Trying: ADMIN → FAILED (0x403)", type: "red", delay: 1350 },
            { text: "[DICT] Trying: 117SPARTAN → FAILED (0x403)", type: "red", delay: 1650 },
            { text: "[DICT] Trying: MASTERCHIEF → FAILED (0x403)", type: "red", delay: 1900 },
            { text: "[DICT] Trying: CORTANA → FAILED (0x403)", type: "red", delay: 2150 },
            { text: "[DICT] Trying: NOBLE6 → FAILED (0x403)", type: "red", delay: 2400 },
            { text: "[DICT] Trying: UNSC2552 → FAILED (0x403)", type: "red", delay: 2600 },
            { text: "[ATCK] Dictionary exhausted. Switching to hybrid mode...", type: "red", delay: 2900 },
            { text: "[HYBR] Analysing active session metadata...", type: "red", delay: 3200 },
            { text: "[HYBR] Hash extracted: SHA-256 → a1f9...d73c", type: "red", delay: 3550 },
            { text: "[HYBR] Semantic pattern detected → motivational phrase structure", type: "red", delay: 3900 },
            { text: "[HYBR] Entropy analysis → 22 chars, no digits, CamelCase", type: "red", delay: 4250 },
            { text: "[HYBR] Matching against leaked credential databases...", type: "red", delay: 4600 },
            { text: "[HYBR] Cross-referencing OSINT & LinkedIn profile...", type: "red", delay: 4950 },
            { text: "[HYBR] Trying: SecurityIsNotAnOption → ...", type: "red", delay: 5350 },
            { text: "[>>>>] MATCH FOUND !!!  PASSWORD = SecurityIsNotAnOption", type: "success", delay: 5950 },
            { text: "[AUTH] Injecting credentials into the form...", type: "success", delay: 6350 },
            { text: "[AUTH] Access granted. Welcome, Administrator.", type: "success", delay: 6750 },
        ];

        let bruteforceActive = false;

        function startBruteforce() {
            if (bruteforceActive) return;
            bruteforceActive = true;

            const bruteBtn = document.getElementById('bruteBtn');
            const terminal = document.getElementById('terminalLog');
            const terminalInner = document.getElementById('terminalInner');
            const passwordInput = document.getElementById('password');
            const connectBtn = document.getElementById('connectBtn');

            bruteBtn.disabled = true;
            bruteBtn.textContent = '⏳  Bypass in progress...';
            terminalInner.innerHTML = '';
            terminal.classList.add('open');

            BRUTEFORCE_LINES.forEach((line) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'terminal-line' + (line.type === 'success' ? ' success' : line.type === 'info' ? ' info' : '');
                    div.textContent = line.text;
                    terminalInner.appendChild(div);
                    terminalInner.scrollTop = terminalInner.scrollHeight;
                }, line.delay);
            });

            // Fill password and unlock button after the last line
            const lastDelay = BRUTEFORCE_LINES[BRUTEFORCE_LINES.length - 1].delay;
            setTimeout(() => {
                // Type the password progressively — shown in plaintext
                const pwd = 'SecurityIsNotAnOption';
                passwordInput.type = 'text';
                passwordInput.classList.remove('input-locked');
                let i = 0;
                const typeInterval = setInterval(() => {
                    if (i <= pwd.length) {
                        passwordInput.value = pwd.slice(0, i);
                        i++;
                    } else {
                        clearInterval(typeInterval);
                        passwordInput.classList.add('input-filled');
                        // Keep type='text' so password stays visible
                        passwordInput.value = pwd;
                        connectBtn.classList.add('unlocked');
                        bruteBtn.textContent = '✓  Bypass Complete';
                    }
                }, 60);
            }, lastDelay + 200);
        }

        function handleConnect(e) {
            e.preventDefault();
        }

        function grantAccess(e) {
            sessionStorage.setItem('unsc_access_granted', 'true');
        }
    </script>
</body>

</html>
